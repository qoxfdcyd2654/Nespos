<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nespos OS — Установка и система</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, BlinkMacSystemFont;
        }

        body {
            background: #0f0f1b;
            height: 100vh;
            overflow: hidden;
            transition: 0.2s;
        }

        /* ------ УСТАНОВЩИК как у Windows 11 ------ */
        .setup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, #14141f, #05050a);
            backdrop-filter: blur(2px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.5s;
        }

        .setup-wizard {
            background: rgba(30, 30, 45, 0.85);
            backdrop-filter: blur(30px);
            border-radius: 32px;
            width: 500px;
            max-width: 85vw;
            padding: 32px;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: fadeUp 0.5s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .setup-step {
            display: none;
        }
        .setup-step.active {
            display: block;
        }

        .setup-wizard h2 {
            font-size: 28px;
            margin-bottom: 20px;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff, #aaccff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .setup-wizard input, .setup-wizard select {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 24px;
            color: white;
            font-size: 16px;
        }

        .avatar-selector {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin: 20px 0;
        }
        .avatar-opt {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #2c2c44;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
            background-size: cover;
        }
        .avatar-opt.selected {
            border-color: #3b82f6;
            transform: scale(1.05);
        }

        button {
            background: #3b82f6;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 20px;
        }

        /* ------------------ ОС после установки ----------------- */
        .os-shell {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            background-size: cover;
            background-position: center;
            transition: 0.2s;
        }
        /* Рабочий стол */
        .desktop {
            flex: 1;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 120px));
            gap: 20px;
            align-content: start;
            overflow-y: auto;
        }
        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100px;
            padding: 12px 5px;
            border-radius: 16px;
            cursor: pointer;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            transition: 0.2s;
            color: white;
        }
        .desktop-icon:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-4px);
        }

        /* Панель задач СНИЗУ (как в реальной ОС) */
        .taskbar {
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(24px);
            border-top: 1px solid rgba(255,255,255,0.15);
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 12px;
            position: relative;
            z-index: 100;
        }
        .start-btn {
            background: #3b82f6;
            border-radius: 28px;
            padding: 8px 20px;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
        .taskbar-apps {
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.3);
            padding: 4px 12px;
            border-radius: 40px;
        }
        .taskbar-item {
            padding: 6px 16px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            cursor: pointer;
        }

        /* Окна приложений */
        .window {
            position: fixed;
            top: 10%;
            left: 15%;
            width: 70%;
            height: 70%;
            background: rgba(30,30,45,0.95);
            backdrop-filter: blur(32px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            flex-direction: column;
            z-index: 200;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: fadeUp 0.2s;
        }
        .window-header {
            padding: 16px;
            background: rgba(0,0,0,0.3);
            border-radius: 24px 24px 0 0;
            display: flex;
            justify-content: space-between;
            cursor: move;
        }
        .window-content {
            flex: 1;
            padding: 16px;
            overflow: auto;
            color: white;
        }
        iframe.browser-frame {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 16px;
            background: white;
        }
        .close-window {
            background: none;
            color: white;
            font-size: 20px;
            margin: 0;
            padding: 0 8px;
        }

        @media (max-width: 700px) {
            .window { width: 90%; left: 5%; }
        }
    </style>
</head>
<body>

<!-- Установщик ОС (как у Windows 11) -->
<div id="setupContainer" class="setup-overlay">
    <div class="setup-wizard">
        <div id="step1" class="setup-step active">
            <h2>✨ Добро пожаловать в Nespos</h2>
            <p>Выберите регион и язык</p>
            <select id="regionSelect"><option>Россия</option><option>США</option><option>Европа</option></select>
            <select id="langSelect"><option>Русский</option><option>English</option></select>
            <button onclick="nextStep(2)">Далее →</button>
        </div>
        <div id="step2" class="setup-step">
            <h2>👤 Кто будет использовать ПК?</h2>
            <input type="text" id="username" placeholder="Имя пользователя" value="Алекс">
            <div class="avatar-selector" id="avatarSelector">
                <div class="avatar-opt" data-avatar="🌌" style="background: #4f46e5; display: flex; align-items: center; justify-content: center; font-size: 40px;">🌌</div>
                <div class="avatar-opt" data-avatar="🚀" style="background: #0f766e; display: flex; align-items: center; justify-content: center; font-size: 40px;">🚀</div>
                <div class="avatar-opt" data-avatar="🎮" style="background: #b91c1c; display: flex; align-items: center; justify-content: center; font-size: 40px;">🎮</div>
                <div class="avatar-opt" data-avatar="🧑‍💻" style="background: #2d3748; display: flex; align-items: center; justify-content: center; font-size: 40px;">🧑‍💻</div>
            </div>
            <button onclick="nextStep(3)">Далее →</button>
        </div>
        <div id="step3" class="setup-step">
            <h2>🎨 Настройки ОС</h2>
            <p>Обои рабочего стола (встроенные):</p>
            <select id="wallpaperSelect">
                <option value="linear-gradient(135deg, #0b1120, #1f2937)">Тёмная волна</option>
                <option value="url('https://images.pexels.com/photos/531880/pexels-photo-531880.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2')">Космос (встроенный)</option>
                <option value="url('https://images.pexels.com/photos/110854/pexels-photo-110854.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2')">Горы неон</option>
            </select>
            <p>Панель задач снизу — включена</p>
            <button onclick="finishSetup()">🚀 Завершить установку и войти</button>
        </div>
    </div>
</div>

<!-- Сама ОС -->
<div id="osShell" class="os-shell">
    <div class="desktop" id="desktopArea">
        <!-- Иконки рабочего стола -->
        <div class="desktop-icon" data-app="browser"><span style="font-size: 36px;">🌐</span><span>Браузер Nespos</span></div>
        <div class="desktop-icon" data-app="weather"><span style="font-size: 36px;">⛅</span><span>Погода</span></div>
        <div class="desktop-icon" data-app="settings"><span style="font-size: 36px;">⚙️</span><span>Настройки</span></div>
        <div class="desktop-icon" data-app="games"><span style="font-size: 36px;">🎮</span><span>Игры</span></div>
        <div class="desktop-icon" data-app="account"><span style="font-size: 36px;">👤</span><span>Аккаунт</span></div>
    </div>
    <div class="taskbar">
        <div class="start-btn" id="startBtn">🗔 ПУСК</div>
        <div class="taskbar-apps" id="taskbarIcons"></div>
        <div style="flex:1"></div>
        <div id="clock" style="color:white; margin-right: 12px;">--:--</div>
    </div>
</div>

<script>
    // === Установка ОС (сохраняем данные пользователя) ===
    let userData = {
        name: "",
        avatar: "🌌",
        region: "Россия",
        language: "Русский",
        wallpaper: "linear-gradient(135deg, #0b1120, #1f2937)"
    };
    let selectedAvatar = "🌌";

    function nextStep(step) {
        document.querySelectorAll('.setup-step').forEach(s => s.classList.remove('active'));
        document.getElementById(`step${step}`).classList.add('active');
        if(step === 2) {
            userData.region = document.getElementById('regionSelect').value;
            userData.language = document.getElementById('langSelect').value;
        }
    }

    // выбор аватарки
    document.querySelectorAll('.avatar-opt').forEach(opt => {
        opt.addEventListener('click', function() {
            document.querySelectorAll('.avatar-opt').forEach(a => a.classList.remove('selected'));
            this.classList.add('selected');
            selectedAvatar = this.getAttribute('data-avatar');
        });
    });
    // выбираем первую по умолчанию
    document.querySelector('.avatar-opt')?.classList.add('selected');

    function finishSetup() {
        userData.name = document.getElementById('username').value || "Гость";
        userData.avatar = selectedAvatar;
        userData.wallpaper = document.getElementById('wallpaperSelect').value;
        // скрыть установщик
        document.getElementById('setupContainer').style.display = 'none';
        const osShell = document.getElementById('osShell');
        osShell.style.display = 'flex';
        // применить обои
        document.body.style.background = userData.wallpaper;
        document.body.style.backgroundSize = 'cover';
        osShell.style.background = userData.wallpaper;
        osShell.style.backgroundSize = 'cover';
        // добавить приветствие в десктоп
        const desktop = document.getElementById('desktopArea');
        const welcomeDiv = document.createElement('div');
        welcomeDiv.className = 'desktop-icon';
        welcomeDiv.innerHTML = `<span style="font-size: 44px;">${userData.avatar}</span><span>${userData.name}</span>`;
        desktop.prepend(welcomeDiv);
        startClock();
    }

    // Часы
    function startClock() {
        setInterval(() => {
            const d = new Date();
            document.getElementById('clock').innerText = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        }, 1000);
    }

    // ---- Управление окнами (приложения) + ВСТРОЕННЫЙ БРАУЗЕР ----
    let openWindows = [];

    function openApp(appId) {
        let content = "";
        let title = "Приложение";
        if(appId === "browser") {
            title = "🌐 Браузер Nespos";
            content = `<iframe class="browser-frame" src="https://www.wikipedia.org" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-same-origin"></iframe>`;
        } else if(appId === "weather") {
            title = "⛅ Погода в городах";
            content = `<div style="padding:12px"><h3>Прогноз Nespos</h3><select id="countryW"><option>США</option><option>Россия</option><option>Германия</option></select>
            <select id="stateW"><option>Калифорния</option><option>Техас</option></select>
            <select id="cityW"><option>Лос-Анджелес</option><option>Сан-Франциско</option></select>
            <button id="getWeatherBtn">Узнать погоду</button><div id="weatherOut" style="margin-top:20px;">🌤️ +22°C, ясно</div>
            <script>
                document.getElementById('getWeatherBtn')?.addEventListener('click',()=>{
                    const cities={ "Лос-Анджелес":"☀️ 26°C","Сан-Франциско":"🌥️ 18°C","Нью-Йорк":"❄️ -1°C"};
                    let city=document.getElementById('cityW').value;
                    document.getElementById('weatherOut').innerHTML = cities[city] || "🌧️ 14°C дождь";
                });
            <\/script></div>`;
        } else if(appId === "settings") {
            title = "⚙️ Персонализация";
            content = `<div><h4>Ночной режим:</h4><button id="nightModeBtn">🌙 Включить / Выключить</button><h4>Обои загрузить</h4><input type="file" id="wallUpload"><button id="applyOwnWall">Применить</button></div>`;
            setTimeout(() => {
                let nightBtn = document.getElementById('nightModeBtn');
                if(nightBtn) nightBtn.onclick = () => document.body.classList.toggle('night-mode');
                document.getElementById('applyOwnWall')?.addEventListener('click',()=>{
                    let file = document.getElementById('wallUpload').files[0];
                    if(file) {
                        let url = URL.createObjectURL(file);
                        document.getElementById('osShell').style.backgroundImage = `url(${url})`;
                        document.body.style.backgroundImage = `url(${url})`;
                    }
                });
            }, 30);
        } else if(appId === "games") {
            title = "🎮 Игры Nespos";
            content = `<div><button id="guessGame">🔢 Угадай число</button><button id="diceGame">🎲 Бросить кубик</button><div id="gameResult"></div></div>`;
            setTimeout(() => {
                document.getElementById('guessGame')?.addEventListener('click',()=>{
                    let secret=Math.floor(Math.random()*100)+1;
                    let guess=prompt("Угадай (1-100)");
                    let tries=1;
                    while(guess!=secret && guess!=null){
                        guess=prompt(guess>secret?"Меньше":"Больше");
                        tries++;
                    }
                    alert(`Победа за ${tries} попыток!`);
                });
                document.getElementById('diceGame')?.addEventListener('click',()=>{
                    document.getElementById('gameResult').innerHTML = `🎲 Выпало: ${Math.floor(Math.random()*6)+1}`;
                });
            },20);
        } else if(appId === "account") {
            title = "👤 Учётная запись";
            content = `<div style="text-align:center"><span style="font-size:80px;">${userData.avatar}</span><h3>${userData.name}</h3><button id="changeNameBtn">Изменить имя</button><button id="changeAvatarBtn">Сменить иконку</button></div>`;
            setTimeout(() => {
                document.getElementById('changeNameBtn')?.addEventListener('click',()=>{
                    let newName=prompt("Новое имя", userData.name);
                    if(newName) userData.name=newName;
                });
            },10);
        }

        // создаем окно
        const winId = "win_" + Date.now();
        const winDiv = document.createElement('div');
        winDiv.className = "window";
        winDiv.id = winId;
        winDiv.innerHTML = `
            <div class="window-header">
                <span>${title}</span>
                <button class="close-window" data-win="${winId}">✕</button>
            </div>
            <div class="window-content">${content}</div>
        `;
        document.body.appendChild(winDiv);
        // закрытие
        winDiv.querySelector('.close-window').addEventListener('click', () => {
            winDiv.remove();
            openWindows = openWindows.filter(w => w !== winId);
        });
        // drag (простой)
        let header = winDiv.querySelector('.window-header');
        let offsetX, offsetY, isDragging=false;
        header.addEventListener('mousedown', (e) => {
            isDragging=true;
            offsetX = e.clientX - winDiv.offsetLeft;
            offsetY = e.clientY - winDiv.offsetTop;
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        });
        function onMouseMove(e) {
            if(isDragging) {
                winDiv.style.left = (e.clientX - offsetX) + 'px';
                winDiv.style.top = (e.clientY - offsetY) + 'px';
                winDiv.style.right = 'auto';
            }
        }
        function onMouseUp() { isDragging=false; document.removeEventListener('mousemove', onMouseMove); }
        winDiv.style.left = '15%';
        winDiv.style.top = '10%';
        openWindows.push(winId);
    }

    // события на иконки рабочего стола и ПУСК
    document.getElementById('desktopArea').addEventListener('click', (e) => {
        let icon = e.target.closest('.desktop-icon');
        if(icon && icon.getAttribute('data-app')) {
            openApp(icon.getAttribute('data-app'));
        }
    });
    document.getElementById('startBtn').addEventListener('click', () => {
        // меню ПУСК - всплывающее
        let startMenu = document.createElement('div');
        startMenu.style.position = 'fixed';
        startMenu.style.bottom = '70px';
        startMenu.style.left = '20px';
        startMenu.style.background = 'rgba(0,0,0,0.8)';
        startMenu.style.backdropFilter = 'blur(24px)';
        startMenu.style.borderRadius = '24px';
        startMenu.style.padding = '16px';
        startMenu.style.zIndex = '300';
        startMenu.innerHTML = `<div style="display:flex; gap:15px; flex-wrap:wrap;"><button data-app="browser">🌐 Браузер</button><button data-app="weather">⛅ Погода</button><button data-app="settings">⚙️ Настройки</button><button data-app="games">🎮 Игры</button><button data-app="account">👤 Аккаунт</button></div>`;
        document.body.appendChild(startMenu);
        startMenu.addEventListener('click', (ev) => {
            let btn = ev.target.closest('button');
            if(btn && btn.getAttribute('data-app')) { openApp(btn.getAttribute('data-app')); startMenu.remove();}
        });
        setTimeout(() => { if(startMenu) startMenu.remove(); }, 5000);
    });

    // добавим стиль ночного режима
    const styleNight = document.createElement('style');
    styleNight.textContent = `body.night-mode, .night-mode .os-shell { background: #1a1110 !important; } .night-mode .window { background: rgba(25,20,18,0.96); }`;
    document.head.appendChild(styleNight);
</script>
</body>
</html>
