<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nespos OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            overflow: hidden;
            font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
        }

        /* ========== УСТАНОВЩИК С НУЛЯ ========== */
        .setup {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0a0f1a 0%, #06090f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .setup-card {
            background: rgba(18, 22, 32, 0.9);
            backdrop-filter: blur(40px);
            border-radius: 2rem;
            padding: 2.5rem;
            width: 480px;
            max-width: 90vw;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .setup-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            background: linear-gradient(90deg, #fff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .setup-select, .setup-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 2rem;
            color: white;
            margin: 0.75rem 0;
        }

        .setup-btn {
            background: linear-gradient(90deg, #3b82f6, #a855f7);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }

        .avatar-classic {
            width: 96px;
            height: 96px;
            background: linear-gradient(135deg, #3b82f6, #a855f7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 1rem auto;
            font-size: 3rem;
            color: white;
            cursor: pointer;
        }

        .step { display: none; }
        .step.active { display: block; }

        /* ========== ОС С НУЛЯ ========== */
        .os {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            background-size: cover;
            background-position: center;
        }

        .desktop {
            flex: 1;
            padding: 1.5rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, 100px);
            gap: 1rem;
            align-content: start;
        }

        .icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 0.25rem;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border-radius: 1rem;
            cursor: pointer;
            color: white;
            transition: 0.2s;
        }

        .icon i { font-size: 2rem; }
        .icon span { font-size: 0.75rem; }
        .icon:hover { background: rgba(255,255,255,0.25); transform: translateY(-4px); }

        .taskbar {
            background: rgba(10, 12, 18, 0.9);
            backdrop-filter: blur(20px);
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0 1rem;
            gap: 1rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .start {
            background: linear-gradient(90deg, #3b82f6, #a855f7);
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            color: white;
        }

        .clock {
            margin-left: auto;
            color: white;
            background: rgba(0,0,0,0.4);
            padding: 0.3rem 1rem;
            border-radius: 2rem;
        }

        /* Меню пуск */
        .start-panel {
            position: fixed;
            bottom: 72px;
            left: 16px;
            width: 280px;
            background: rgba(18, 22, 32, 0.95);
            backdrop-filter: blur(32px);
            border-radius: 1.5rem;
            padding: 1rem;
            border: 1px solid rgba(255,255,255,0.1);
            opacity: 0;
            transform: translateY(10px);
            transition: 0.2s;
            pointer-events: none;
        }

        .start-panel.open {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        .start-panel button {
            display: block;
            width: 100%;
            text-align: left;
            background: rgba(255,255,255,0.05);
            border: none;
            padding: 0.6rem 1rem;
            margin: 0.3rem 0;
            border-radius: 1rem;
            color: white;
            cursor: pointer;
        }

        /* Окна с ресайзом */
        .window {
            position: fixed;
            top: 10%;
            left: 15%;
            width: 500px;
            min-width: 250px;
            min-height: 250px;
            background: rgba(20, 24, 36, 0.97);
            backdrop-filter: blur(32px);
            border-radius: 1.5rem;
            border: 1px solid rgba(255,255,255,0.15);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .window-bar {
            padding: 0.8rem 1rem;
            background: rgba(59, 130, 246, 0.3);
            border-radius: 1.5rem 1.5rem 0 0;
            display: flex;
            justify-content: space-between;
            cursor: grab;
            color: white;
        }

        .window-body {
            flex: 1;
            padding: 1rem;
            overflow: auto;
            color: #e0e0e0;
        }

        .window-resize {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 20px;
            height: 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 0 0 1rem 0;
            cursor: nw-resize;
        }

        .close {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
        }

        iframe.browser {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 1rem;
        }

        @media (max-width: 640px) {
            .window { width: 90%; left: 5%; }
            .start-panel { width: 240px; }
        }
    </style>
</head>
<body>

<!-- УСТАНОВЩИК (полностью новый) -->
<div id="setupApp" class="setup">
    <div class="setup-card">
        <div id="step1" class="step active">
            <div class="setup-title">Страна</div>
            <select id="country" class="setup-select">
                <option value="russia">Россия (RUB)</option><option value="usa">США (USD)</option>
                <option value="germany">Германия (EUR)</option><option value="japan">Япония (JPY)</option>
                <option value="china">Китай (CNY)</option><option value="taiwan">Тайвань → Китай</option>
                <option value="ukraine">Украина (UAH)</option><option value="belarus">Беларусь (BYN)</option>
                <option value="canada">Канада (CAD)</option><option value="uk">Великобритания (GBP)</option>
                <option value="mexico">Мексика (MXN)</option><option value="denmark">Дания (DKK)</option>
                <option value="greenland">Гренландия (DKK)</option><option value="iceland">Исландия (ISK)</option>
                <option value="kazakhstan">Казахстан (KZT)</option><option value="kyrgyzstan">Кыргызстан (KGS)</option>
                <option value="pakistan">Пакистан (PKR)</option><option value="southkorea">Южная Корея (KRW)</option>
                <option value="northkorea">Северная Корея</option>
                <option value="sudan">Судан (SDG)</option><option value="southsudan">Южный Судан (SSP)</option>
                <option value="brazil">Бразилия (BRL)</option><option value="paraguay">Парагвай (PYG)</option>
            </select>
            <div id="countryErr" style="color:#f97316; margin-top:0.5rem; display:none;">Ошибка: Северная Корея</div>
            <button class="setup-btn" onclick="nextStep(2)">Далее</button>
        </div>

        <div id="step2" class="step">
            <div class="setup-title">Профиль</div>
            <input type="text" id="username" class="setup-input" placeholder="Имя" value="Алексей">
            <div id="avatarBox" class="avatar-classic">
                <i class="fas fa-user"></i>
            </div>
            <input type="file" id="avatarFile" accept="image/*" style="display:none;">
            <button class="setup-btn" id="changeAvatar">Сменить аватар</button>
            <button class="setup-btn" onclick="nextStep(3)" style="margin-left:0.5rem;">Далее</button>
        </div>

        <div id="step3" class="step">
            <div class="setup-title">Обои</div>
            <select id="wallpaper" class="setup-select">
                <option value="https://images.pexels.com/photos/998641/pexels-photo-998641.jpeg">Космос</option>
                <option value="https://images.pexels.com/photos/2387793/pexels-photo-2387793.jpeg">Горы</option>
                <option value="https://images.pexels.com/photos/1252890/pexels-photo-1252890.jpeg">Океан</option>
                <option value="linear-gradient(135deg, #1a1a2e, #16213e)">Тёмный градиент</option>
            </select>
            <button class="setup-btn" id="finishSetup">Запустить</button>
        </div>
    </div>
</div>

<!-- ОС -->
<div id="osRoot" class="os">
    <div class="desktop" id="desktopGrid"></div>
    <div class="taskbar">
        <div class="start" id="startTrigger">Пуск</div>
        <div style="flex:1"></div>
        <div class="clock" id="time"></div>
    </div>
</div>

<script>
    // ЧИСТЫЙ JS С НУЛЯ
    let user = {
        name: "Алексей",
        avatar: null,
        country: "russia",
        currency: "RUB",
        wallpaper: "https://images.pexels.com/photos/998641/pexels-photo-998641.jpeg"
    };

    const currencyMap = {
        russia:"RUB", usa:"USD", germany:"EUR", japan:"JPY", china:"CNY",
        taiwan:"CNY", ukraine:"UAH", belarus:"BYN", canada:"CAD", uk:"GBP",
        mexico:"MXN", denmark:"DKK", greenland:"DKK", iceland:"ISK",
        kazakhstan:"KZT", kyrgyzstan:"KGS", pakistan:"PKR", southkorea:"KRW",
        northkorea:"ERROR", sudan:"SDG", southsudan:"SSP", brazil:"BRL", paraguay:"PYG"
    };

    let step = 1;
    function nextStep(s) {
        if(s===2) {
            let c = document.getElementById('country').value;
            if(c === 'northkorea') {
                document.getElementById('countryErr').style.display = 'block';
                return;
            }
            document.getElementById('countryErr').style.display = 'none';
            user.country = c;
            user.currency = currencyMap[c];
        }
        document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
        document.getElementById(`step${s}`).classList.add('active');
    }

    // аватар
    document.getElementById('changeAvatar')?.addEventListener('click', () => {
        document.getElementById('avatarFile').click();
    });
    document.getElementById('avatarFile')?.addEventListener('change', (e) => {
        if(e.target.files[0]) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                user.avatar = ev.target.result;
                const box = document.getElementById('avatarBox');
                box.innerHTML = `<img src="${user.avatar}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
                box.style.background = 'none';
                box.style.padding = '0';
            };
            reader.readAsDataURL(e.target.files[0]);
        }
    });

    document.getElementById('finishSetup')?.addEventListener('click', () => {
        user.name = document.getElementById('username').value || "Пользователь";
        user.wallpaper = document.getElementById('wallpaper').value;
        document.getElementById('setupApp').style.display = 'none';
        const os = document.getElementById('osRoot');
        os.style.display = 'flex';
        os.style.backgroundImage = `url('${user.wallpaper}')`;
        if(user.wallpaper.includes('gradient')) os.style.background = user.wallpaper;
        document.body.style.background = user.wallpaper;
        renderDesktop();
        setInterval(() => {
            document.getElementById('time').innerHTML = new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
        }, 1000);
    });

    function renderDesktop() {
        const grid = document.getElementById('desktopGrid');
        grid.innerHTML = `
            <div class="icon" data-app="browser"><i class="fas fa-globe"></i><span>Браузер</span></div>
            <div class="icon" data-app="weather"><i class="fas fa-cloud-sun"></i><span>Погода</span></div>
            <div class="icon" data-app="currency"><i class="fas fa-coins"></i><span>Курс валют</span></div>
            <div class="icon" data-app="settings"><i class="fas fa-sliders-h"></i><span>Настройки</span></div>
            <div class="icon" data-app="games"><i class="fas fa-gamepad"></i><span>Игры</span></div>
            <div class="icon" data-app="profile"><i class="fas fa-user"></i><span>Профиль</span></div>
        `;
    }

    // Меню пуск
    let startPanel = null;
    function toggleStart() {
        if(startPanel) {
            startPanel.classList.remove('open');
            setTimeout(() => { if(startPanel) startPanel.remove(); startPanel=null; }, 200);
            return;
        }
        const panel = document.createElement('div');
        panel.className = 'start-panel';
        panel.innerHTML = `
            <div style="padding:0.5rem; color:white;">${user.name}</div>
            <button data-app="browser"><i class="fas fa-globe"></i> Браузер</button>
            <button data-app="weather"><i class="fas fa-cloud-sun"></i> Погода</button>
            <button data-app="currency"><i class="fas fa-coins"></i> Курс валют</button>
            <button data-app="settings"><i class="fas fa-sliders-h"></i> Настройки</button>
            <button data-app="games"><i class="fas fa-gamepad"></i> Игры</button>
            <button data-app="profile"><i class="fas fa-user"></i> Профиль</button>
        `;
        document.body.appendChild(panel);
        setTimeout(() => panel.classList.add('open'), 10);
        startPanel = panel;
        panel.addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if(btn && btn.dataset.app) {
                openApp(btn.dataset.app);
                toggleStart();
            }
        });
        const closer = (e) => {
            if(!panel.contains(e.target) && e.target.id !== 'startTrigger') {
                toggleStart();
                document.removeEventListener('click', closer);
            }
        };
        setTimeout(() => document.addEventListener('click', closer), 50);
    }
    document.getElementById('startTrigger')?.addEventListener('click', toggleStart);

    // Окна с ресайзом
    function createWindow(title, bodyHtml) {
        const win = document.createElement('div');
        win.className = 'window';
        win.innerHTML = `
            <div class="window-bar">
                <span><i class="fas fa-window-maximize"></i> ${title}</span>
                <button class="close">✕</button>
            </div>
            <div class="window-body">${bodyHtml}</div>
            <div class="window-resize"></div>
        `;
        document.body.appendChild(win);
        win.querySelector('.close').onclick = () => win.remove();

        // drag
        let drag = false, dx, dy;
        const bar = win.querySelector('.window-bar');
        bar.addEventListener('mousedown', (e) => {
            if(e.target.classList.contains('close')) return;
            drag = true;
            dx = e.clientX - win.offsetLeft;
            dy = e.clientY - win.offsetTop;
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
        });
        function onMove(e) { if(drag) { win.style.left = (e.clientX - dx) + 'px'; win.style.top = (e.clientY - dy) + 'px'; win.style.right = 'auto'; }}
        function onUp() { drag = false; document.removeEventListener('mousemove', onMove); }

        // resize
        let resize = false, sx, sy, sw, sh;
        const handle = win.querySelector('.window-resize');
        handle.addEventListener('mousedown', (e) => {
            resize = true;
            sx = e.clientX;
            sy = e.clientY;
            sw = win.offsetWidth;
            sh = win.offsetHeight;
            e.preventDefault();
            document.addEventListener('mousemove', onResize);
            document.addEventListener('mouseup', stopResize);
        });
        function onResize(e) {
            if(resize) {
                let nw = sw + (e.clientX - sx);
                let nh = sh + (e.clientY - sy);
                if(nw > 280) win.style.width = nw + 'px';
                if(nh > 200) win.style.height = nh + 'px';
            }
        }
        function stopResize() { resize = false; document.removeEventListener('mousemove', onResize); }
        return win;
    }

    // Приложения
    async function getWeather(city) {
        try {
            const geo = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1`);
            const g = await geo.json();
            if(!g.results) return null;
            const w = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${g.results[0].latitude}&longitude=${g.results[0].longitude}&current_weather=true`);
            const weather = await w.json();
            return { name: g.results[0].name, temp: weather.current_weather.temperature, wind: weather.current_weather.windspeed };
        } catch(e) { return null; }
    }

    function openApp(id) {
        if(id === 'browser') {
            const wid = Date.now();
            const win = createWindow('Браузер', `<div style="height:100%; display:flex; flex-direction:column;"><input id="url_${wid}" placeholder="Введите сайт" style="padding:0.5rem; border-radius:2rem; margin-bottom:0.5rem;"><button id="go_${wid}" style="margin-bottom:0.5rem;">Перейти</button><iframe id="frame_${wid}" class="browser" src="https://yandex.ru"></iframe></div>`);
            setTimeout(() => {
                const go = win.querySelector(`#go_${wid}`);
                const inp = win.querySelector(`#url_${wid}`);
                const frame = win.querySelector(`#frame_${wid}`);
                if(go && inp && frame) go.onclick = () => { let url = inp.value; if(!url.startsWith('http')) url = 'https://' + url; frame.src = url; };
            }, 20);
        }
        else if(id === 'weather') {
            const win = createWindow('Погода', `<div><input id="weatherCity" placeholder="Город" value="Москва"><button id="getWeatherBtn">Узнать</button><div id="weatherRes" style="margin-top:1rem; background:rgba(255,255,255,0.1); border-radius:1rem; padding:1rem;"></div></div>`);
            setTimeout(async () => {
                const btn = win.querySelector('#getWeatherBtn');
                const inp = win.querySelector('#weatherCity');
                const res = win.querySelector('#weatherRes');
                async function load() {
                    if(res) res.innerHTML = "Загрузка...";
                    const data = await getWeather(inp?.value || "Москва");
                    if(data && res) res.innerHTML = `${data.name}: ${data.temp}°C, ветер ${data.wind} км/ч`;
                    else if(res) res.innerHTML = "Солнечно, +24°C";
                }
                if(btn) btn.onclick = load;
                load();
            }, 20);
        }
        else if(id === 'currency') {
            const win = createWindow(`Курс валют (${user.currency})`, `<div id="currData">Загрузка...</div>`);
            setTimeout(async () => {
                const cont = win.querySelector('#currData');
                try {
                    const r = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
                    const d = await r.json();
                    if(cont) cont.innerHTML = `<div style="background:rgba(255,255,255,0.1); border-radius:1rem; padding:1rem;"><h3>1 USD = ${d.rates[user.currency]} ${user.currency}</h3><p>EUR: ${d.rates.EUR}</p><p>GBP: ${d.rates.GBP}</p><p>CNY: ${d.rates.CNY}</p><button id="refreshCurr">Обновить</button></div>`;
                    const ref = win.querySelector('#refreshCurr');
                    if(ref) ref.onclick = () => openApp('currency');
                } catch(e) { if(cont) cont.innerHTML = "Ошибка загрузки"; }
            }, 20);
        }
        else if(id === 'settings') {
            const win = createWindow('Настройки', `<div><button id="uploadWall">Сменить обои</button><input type="file" id="wallFile"><button id="nightMode">Ночной режим</button></div>`);
            setTimeout(() => {
                const up = win.querySelector('#uploadWall');
                const file = win.querySelector('#wallFile');
                if(up && file) up.onclick = () => file.click();
                if(file) file.onchange = (e) => {
                    if(e.target.files[0]) {
                        const url = URL.createObjectURL(e.target.files[0]);
                        document.getElementById('osRoot').style.backgroundImage = `url(${url})`;
                    }
                };
                win.querySelector('#nightMode')?.addEventListener('click', () => document.body.classList.toggle('night'));
            }, 20);
        }
        else if(id === 'games') {
            const win = createWindow('Игры', `<div><button id="guess">Угадай число</button><button id="dice">Кубик</button><div id="gameOut"></div></div>`);
            setTimeout(() => {
                win.querySelector('#guess')?.addEventListener('click', () => {
                    let s = Math.floor(Math.random()*100)+1;
                    let g = prompt("Число 1-100");
                    while(g != s && g != null) g = prompt(g > s ? "Меньше" : "Больше");
                    alert("Победа!");
                });
                win.querySelector('#dice')?.addEventListener('click', () => {
                    win.querySelector('#gameOut').innerHTML = `Выпало: ${Math.floor(Math.random()*6)+1}`;
                });
            }, 20);
        }
        else if(id === 'profile') {
            const avatarHtml = user.avatar ? `<img src="${user.avatar}" style="width:80px; height:80px; border-radius:50%;">` : `<i class="fas fa-user" style="font-size:3rem;"></i>`;
            const win = createWindow('Профиль', `<div style="display:flex; gap:1rem;">${avatarHtml}<div><h3>${user.name}</h3><p>${user.country}, ${user.currency}</p><button id="editName">Изменить имя</button></div></div>`);
            setTimeout(() => {
                win.querySelector('#editName')?.addEventListener('click', () => {
                    let n = prompt("Новое имя", user.name);
                    if(n) user.name = n;
                });
            }, 20);
        }
    }

    document.getElementById('desktopGrid')?.addEventListener('click', (e) => {
        const icon = e.target.closest('.icon');
        if(icon && icon.dataset.app) openApp(icon.dataset.app);
    });

    const night = document.createElement('style');
    night.textContent = `body.night .os { background: #1a1412 !important; } body.night .window { background: rgba(20,18,20,0.97); }`;
    document.head.appendChild(night);
</script>
</body>
</html>
