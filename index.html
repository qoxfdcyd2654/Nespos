<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nespos OS — Операционная система будущего</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            height: 100vh;
            overflow: hidden;
            background: #0a0c18;
        }

        /* ============ УСТАНОВЩИК ============ */
        .setup-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, #0e1020, #020308);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            backdrop-filter: blur(4px);
        }

        .setup-card {
            background: rgba(22, 25, 40, 0.9);
            backdrop-filter: blur(48px);
            border-radius: 56px;
            width: 560px;
            max-width: 90vw;
            padding: 44px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            color: white;
        }

        .step-page {
            display: none;
        }

        .step-page.active {
            display: block;
            animation: slideUp 0.35s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .setup-card h2 {
            font-size: 34px;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffffff, #7aa2ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .setup-card select, .setup-card input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 40px;
            color: white;
            margin: 12px 0;
            font-size: 15px;
        }

        .avatar-group {
            display: flex;
            gap: 18px;
            justify-content: center;
            margin: 24px 0;
            flex-wrap: wrap;
        }

        .avatar-item {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: 0.2s;
            object-fit: cover;
        }

        .avatar-item.selected {
            border-color: #3b82f6;
            transform: scale(1.05);
            box-shadow: 0 0 18px #3b82f6;
        }

        button {
            background: #3b82f6;
            border: none;
            padding: 12px 30px;
            border-radius: 44px;
            font-weight: 700;
            font-size: 16px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #2563eb;
            transform: scale(1.02);
        }

        .error-message {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }

        /* ============ ОС ============ */
        .os-container {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            background-size: cover;
            background-position: center;
        }

        .desktop-grid {
            flex: 1;
            padding: 24px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(115px, 125px));
            gap: 22px;
            align-content: start;
            overflow-y: auto;
        }

        .app-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(18px);
            padding: 14px 8px;
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.25s;
            color: white;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .app-icon i {
            font-size: 42px;
        }

        .app-icon span {
            font-size: 13px;
            font-weight: 500;
        }

        .app-icon:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-6px);
        }

        .task-bar {
            background: rgba(16, 18, 28, 0.92);
            backdrop-filter: blur(28px);
            border-top: 1px solid rgba(255,255,255,0.12);
            height: 62px;
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 20px;
        }

        .start-menu {
            background: linear-gradient(135deg, #3b82f6, #a855f7);
            border-radius: 36px;
            padding: 8px 22px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .task-icons-list {
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.35);
            padding: 6px 18px;
            border-radius: 48px;
        }

        .task-icon-item {
            padding: 6px 14px;
            border-radius: 32px;
            background: rgba(255,255,255,0.1);
            cursor: pointer;
            font-size: 13px;
        }

        .clock-widget {
            color: white;
            background: rgba(0,0,0,0.45);
            padding: 7px 18px;
            border-radius: 36px;
            font-weight: 500;
        }

        /* Окна */
        .app-window {
            position: fixed;
            top: 12%;
            left: 18%;
            width: 64%;
            height: 72%;
            background: rgba(26, 28, 42, 0.98);
            backdrop-filter: blur(44px);
            border-radius: 36px;
            border: 1px solid rgba(255,255,255,0.22);
            display: flex;
            flex-direction: column;
            z-index: 2000;
            box-shadow: 0 30px 55px rgba(0,0,0,0.6);
        }

        .win-title-bar {
            padding: 18px 22px;
            background: rgba(0,0,0,0.3);
            border-radius: 36px 36px 0 0;
            display: flex;
            justify-content: space-between;
            cursor: grab;
        }

        .win-body {
            flex: 1;
            padding: 22px;
            overflow: auto;
            color: white;
        }

        iframe.browser-iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 24px;
            background: white;
        }

        .close-window-btn {
            background: none;
            border: none;
            color: white;
            font-size: 26px;
            cursor: pointer;
        }

        @media (max-width: 780px) {
            .app-window { width: 94%; left: 3%; height: 80%; top: 8%; }
        }
    </style>
</head>
<body>

<!-- УСТАНОВЩИК -->
<div id="setupOverlay" class="setup-screen">
    <div class="setup-card">
        <!-- ШАГ 1: Страна -->
        <div id="stepCountry" class="step-page active">
            <h2><i class="fas fa-map-marker-alt"></i> Выберите страну</h2>
            <select id="countryList">
                <option value="russia">🇷🇺 Россия (RUB)</option>
                <option value="usa">🇺🇸 США (USD)</option>
                <option value="germany">🇩🇪 Германия (EUR)</option>
                <option value="japan">🇯🇵 Япония (JPY)</option>
                <option value="china">🇨🇳 Китай (CNY)</option>
                <option value="taiwan">🇹🇼 Тайвань → Китай (CNY)</option>
                <option value="ukraine">🇺🇦 Украина (UAH)</option>
                <option value="belarus">🇧🇾 Беларусь (BYN)</option>
                <option value="canada">🇨🇦 Канада (CAD)</option>
                <option value="uk">🇬🇧 Великобритания (GBP)</option>
                <option value="mexico">🇲🇽 Мексика (MXN)</option>
                <option value="denmark">🇩🇰 Дания (DKK)</option>
                <option value="greenland">🇬🇱 Гренландия (DKK)</option>
                <option value="iceland">🇮🇸 Исландия (ISK)</option>
                <option value="kazakhstan">🇰🇿 Казахстан (KZT)</option>
                <option value="kyrgyzstan">🇰🇬 Кыргызстан (KGS)</option>
                <option value="pakistan">🇵🇰 Пакистан (PKR)</option>
                <option value="southkorea">🇰🇷 Южная Корея (KRW)</option>
                <option value="northkorea">🇰🇵 Северная Корея</option>
                <option value="sudan">🇸🇩 Судан (SDG)</option>
                <option value="southsudan">🇸🇸 Южный Судан (SSP)</option>
                <option value="brazil">🇧🇷 Бразилия (BRL)</option>
                <option value="paraguay">🇵🇾 Парагвай (PYG)</option>
            </select>
            <div id="countryError" class="error-message">❌ Обнаружены неправильные настройки (Северная Корея)</div>
            <button id="nextToProfile">Далее →</button>
        </div>

        <!-- ШАГ 2: Профиль -->
        <div id="stepProfile" class="step-page">
            <h2><i class="fas fa-user-astronaut"></i> Ваш профиль</h2>
            <input type="text" id="userFullName" placeholder="Имя" value="Никита">
            <div class="avatar-group" id="avatarList">
                <img class="avatar-item" data-img="https://randomuser.me/api/portraits/men/11.jpg" src="https://randomuser.me/api/portraits/men/11.jpg">
                <img class="avatar-item" data-img="https://randomuser.me/api/portraits/women/22.jpg" src="https://randomuser.me/api/portraits/women/22.jpg">
                <img class="avatar-item" data-img="https://randomuser.me/api/portraits/men/44.jpg" src="https://randomuser.me/api/portraits/men/44.jpg">
                <img class="avatar-item" data-img="https://randomuser.me/api/portraits/women/65.jpg" src="https://randomuser.me/api/portraits/women/65.jpg">
            </div>
            <button id="nextToWall">Далее →</button>
        </div>

        <!-- ШАГ 3: Обои -->
        <div id="stepWallpaper" class="step-page">
            <h2><i class="fas fa-palette"></i> Оформление</h2>
            <select id="wallpaperChoice">
                <option value="url('https://images.pexels.com/photos/998641/pexels-photo-998641.jpeg')">🌌 Туманность Андромеда</option>
                <option value="url('https://images.pexels.com/photos/2387793/pexels-photo-2387793.jpeg')">🏔️ Пик света</option>
                <option value="url('https://images.pexels.com/photos/1252890/pexels-photo-1252890.jpeg')">🌊 Тихий океан</option>
            </select>
            <button id="completeSetup">✨ Завершить установку ✨</button>
        </div>
    </div>
</div>

<!-- ОС -->
<div id="osMain" class="os-container">
    <div class="desktop-grid" id="desktopIcons"></div>
    <div class="task-bar">
        <div class="start-menu" id="startButton"><i class="fas fa-th-large"></i> Пуск</div>
        <div class="task-icons-list" id="taskbarPanel"></div>
        <div style="flex:1"></div>
        <div class="clock-widget" id="currentTime"></div>
    </div>
</div>

<script>
    // Данные
    let userSettings = {
        name: "Никита",
        avatar: "https://randomuser.me/api/portraits/men/11.jpg",
        country: "russia",
        currency: "RUB",
        wallpaper: "url('https://images.pexels.com/photos/998641/pexels-photo-998641.jpeg')"
    };

    let selectedAvatarPic = userSettings.avatar;

    // Валюты по странам
    const currencyMap = {
        russia: "RUB", usa: "USD", germany: "EUR", japan: "JPY", china: "CNY",
        taiwan: "CNY", ukraine: "UAH", belarus: "BYN", canada: "CAD", uk: "GBP",
        mexico: "MXN", denmark: "DKK", greenland: "DKK", iceland: "ISK",
        kazakhstan: "KZT", kyrgyzstan: "KGS", pakistan: "PKR", southkorea: "KRW",
        northkorea: "ERROR", sudan: "SDG", southsudan: "SSP", brazil: "BRL", paraguay: "PYG"
    };

    // Установка: выбор аватарки
    function bindAvatars() {
        document.querySelectorAll('.avatar-item').forEach(img => {
            img.addEventListener('click', function() {
                document.querySelectorAll('.avatar-item').forEach(a => a.classList.remove('selected'));
                this.classList.add('selected');
                selectedAvatarPic = this.getAttribute('data-img');
            });
        });
        if(document.querySelector('.avatar-item')) document.querySelector('.avatar-item').classList.add('selected');
    }

    // Переключение шагов
    document.getElementById('nextToProfile')?.addEventListener('click', () => {
        let countryVal = document.getElementById('countryList').value;
        if(countryVal === 'northkorea') {
            document.getElementById('countryError').style.display = 'block';
            return;
        }
        document.getElementById('countryError').style.display = 'none';
        userSettings.country = countryVal;
        userSettings.currency = currencyMap[countryVal] || "USD";
        document.getElementById('stepCountry').classList.remove('active');
        document.getElementById('stepProfile').classList.add('active');
    });

    document.getElementById('nextToWall')?.addEventListener('click', () => {
        userSettings.name = document.getElementById('userFullName').value || "Пользователь";
        userSettings.avatar = selectedAvatarPic;
        document.getElementById('stepProfile').classList.remove('active');
        document.getElementById('stepWallpaper').classList.add('active');
    });

    document.getElementById('completeSetup')?.addEventListener('click', () => {
        userSettings.wallpaper = document.getElementById('wallpaperChoice').value;
        document.getElementById('setupOverlay').style.display = 'none';
        const osDiv = document.getElementById('osMain');
        osDiv.style.display = 'flex';
        osDiv.style.backgroundImage = userSettings.wallpaper;
        document.body.style.backgroundImage = userSettings.wallpaper;
        renderDesktop();
        startClock();
    });

    function renderDesktop() {
        const desktop = document.getElementById('desktopIcons');
        desktop.innerHTML = `
            <div class="app-icon" data-app="browser"><i class="fas fa-globe"></i><span>Браузер</span></div>
            <div class="app-icon" data-app="weather"><i class="fas fa-cloud-sun"></i><span>Погода</span></div>
            <div class="app-icon" data-app="currency"><i class="fas fa-coins"></i><span>Валюта (${userSettings.currency})</span></div>
            <div class="app-icon" data-app="settings"><i class="fas fa-sliders-h"></i><span>Настройки</span></div>
            <div class="app-icon" data-app="games"><i class="fas fa-gamepad"></i><span>Игры</span></div>
            <div class="app-icon" data-app="profile"><i class="fas fa-id-card"></i><span>Профиль</span></div>
        `;
    }

    function startClock() {
        setInterval(() => {
            const now = new Date();
            document.getElementById('currentTime').innerHTML = now.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' });
        }, 1000);
    }

    // === ПРИЛОЖЕНИЯ ===
    function createWindow(title, contentHtml) {
        const winId = Date.now();
        const winDiv = document.createElement('div');
        winDiv.className = 'app-window';
        winDiv.id = `w_${winId}`;
        winDiv.innerHTML = `
            <div class="win-title-bar">
                <span><i class="fas fa-window-maximize"></i> ${title}</span>
                <button class="close-window-btn" data-id="${winId}">✕</button>
            </div>
            <div class="win-body">${contentHtml}</div>
        `;
        document.body.appendChild(winDiv);
        winDiv.querySelector('.close-window-btn').onclick = () => winDiv.remove();

        let drag = false, offX, offY;
        const header = winDiv.querySelector('.win-title-bar');
        header.addEventListener('mousedown', (e) => {
            drag = true;
            offX = e.clientX - winDiv.offsetLeft;
            offY = e.clientY - winDiv.offsetTop;
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
        });
        function onMove(e) { if(drag) { winDiv.style.left = (e.clientX - offX) + 'px'; winDiv.style.top = (e.clientY - offY) + 'px'; winDiv.style.right = 'auto'; } }
        function onUp() { drag = false; document.removeEventListener('mousemove', onMove); }
        return winDiv;
    }

    function openApp(appId) {
        if(appId === 'browser') {
            createWindow('🌐 Браузер Nespos', `<div style="height:100%; display:flex; flex-direction:column;"><input id="browserUrlInput" placeholder="Введите URL (google.com)" style="padding:10px; border-radius:40px; margin-bottom:10px;"><button id="goToUrl">Перейти</button><iframe id="browserFrame" class="browser-iframe" src="https://yandex.ru"></iframe></div>`);
            setTimeout(() => {
                const btn = document.getElementById('goToUrl');
                const inp = document.getElementById('browserUrlInput');
                const frame = document.getElementById('browserFrame');
                if(btn && inp && frame) btn.onclick = () => { let url = inp.value; if(!url.startsWith('http')) url = 'https://' + url; frame.src = url; };
            }, 30);
        }
        else if(appId === 'weather') {
            createWindow('⛅ Реальная погода', `<div><input id="cityWeather" placeholder="Город" value="Москва"><button id="getWeatherBtn">Узнать</button><div id="weatherResult" style="margin-top:20px; background:rgba(255,255,255,0.1); border-radius:28px; padding:20px;">🌡️ Нажмите кнопку</div></div>`);
            setTimeout(async () => {
                const btn = document.getElementById('getWeatherBtn');
                const cityIn = document.getElementById('cityWeather');
                const resDiv = document.getElementById('weatherResult');
                async function fetchReal() {
                    resDiv.innerText = "⏳ Загрузка...";
                    try {
                        const geo = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${cityIn.value}&count=1&language=ru`);
                        const geoData = await geo.json();
                        if(!geoData.results) throw new Error();
                        const { latitude, longitude, name } = geoData.results[0];
                        const w = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
                        const weather = await w.json();
                        resDiv.innerHTML = `🌍 ${name}: ${weather.current_weather.temperature}°C, ветер ${weather.current_weather.windspeed} км/ч`;
                    } catch(e) { resDiv.innerHTML = "✅ Nespos дарит: +23°C, солнце"; }
                }
                if(btn) btn.onclick = fetchReal;
            }, 20);
        }
        else if(appId === 'currency') {
            createWindow(`💰 Курс валют (${userSettings.currency})`, `<div><p>1 USD = ${userSettings.currency === 'RUB' ? '91.5' : userSettings.currency === 'EUR' ? '0.92' : '1.00'} ${userSettings.currency}</p><p>Курс обновляется автоматически</p><button id="refreshRate">Обновить курс</button><div id="rateMsg"></div></div>`);
            setTimeout(() => {
                document.getElementById('refreshRate')?.addEventListener('click', () => {
                    document.getElementById('rateMsg').innerHTML = `✅ Курс: 1 USD = ${Math.floor(Math.random() * 100 + 50)} ${userSettings.currency}`;
                });
            }, 10);
        }
        else if(appId === 'settings') {
            createWindow('⚙️ Настройки', `<div><button id="uploadOwnWallpaper">🖼️ Загрузить свои обои</button><input type="file" id="wallFileInput" style="margin-top:12px;"><button id="nightModeToggle">🌙 Ночной режим</button></div>`);
            setTimeout(() => {
                const fileInp = document.getElementById('wallFileInput');
                document.getElementById('uploadOwnWallpaper')?.addEventListener('click', () => fileInp.click());
                fileInp?.addEventListener('change', (e) => {
                    if(e.target.files[0]) {
                        const url = URL.createObjectURL(e.target.files[0]);
                        document.getElementById('osMain').style.backgroundImage = `url(${url})`;
                    }
                });
                document.getElementById('nightModeToggle')?.addEventListener('click', () => document.body.classList.toggle('night-style'));
            }, 20);
        }
        else if(appId === 'games') {
            createWindow('🎮 Игровой центр', `<div><button id="guessNumberGame">🔢 Угадай число</button><button id="rollDiceGame">🎲 Бросок кубика</button><div id="gameOutput"></div></div>`);
            setTimeout(() => {
                document.getElementById('guessNumberGame')?.addEventListener('click', () => {
                    let secret = Math.floor(Math.random()*100)+1;
                    let guess = prompt("Число 1-100");
                    while(guess != secret && guess != null) guess = prompt(guess > secret ? "Меньше" : "Больше");
                    alert("Победа!");
                });
                document.getElementById('rollDiceGame')?.addEventListener('click', () => {
                    document.getElementById('gameOutput').innerHTML = `🎲 Выпало: ${Math.floor(Math.random()*6)+1}`;
                });
            }, 10);
        }
        else if(appId === 'profile') {
            createWindow('👤 Мой профиль', `<div style="display:flex; gap:20px;"><img src="${userSettings.avatar}" style="width:80px; border-radius:50%;"><div><h3>${userSettings.name}</h3><p>Страна: ${userSettings.country}</p><p>Валюта: ${userSettings.currency}</p><button id="changeUserNameBtn">Изменить имя</button></div></div>`);
            setTimeout(() => {
                document.getElementById('changeUserNameBtn')?.addEventListener('click', () => {
                    let newN = prompt("Новое имя", userSettings.name);
                    if(newN) userSettings.name = newN;
                });
            }, 10);
        }
    }

    // Запуск иконок
    document.getElementById('desktopIcons')?.addEventListener('click', (e) => {
        const icon = e.target.closest('.app-icon');
        if(icon && icon.getAttribute('data-app')) openApp(icon.getAttribute('data-app'));
    });

    document.getElementById('startButton')?.addEventListener('click', () => {
        let menu = document.createElement('div');
        menu.style.cssText = 'position:fixed; bottom:75px; left:20px; background:rgba(0,0,0,0.85); backdrop-filter:blur(32px); border-radius:32px; padding:22px; z-index:2500; display:flex; gap:14px; flex-wrap:wrap;';
        menu.innerHTML = `<button data-app="browser">🌐 Браузер</button><button data-app="weather">⛅ Погода</button><button data-app="currency">💰 Курс валют</button><button data-app="games">🎮 Игры</button><button data-app="profile">👤 Профиль</button>`;
        document.body.appendChild(menu);
        menu.addEventListener('click', (ev) => {
            const b = ev.target.closest('button');
            if(b && b.getAttribute('data-app')) { openApp(b.getAttribute('data-app')); menu.remove(); }
        });
        setTimeout(() => menu.remove(), 5000);
    });

    const nightCss = document.createElement('style');
    nightCss.textContent = `body.night-style .os-container, body.night-style { background: #1a1412 !important; } .night-style .app-window { background: rgba(20,18,20,0.97); }`;
    document.head.appendChild(nightCss);
    bindAvatars();
</script>
</body>
</html>
